<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Morning Paper Digest for Microelectronics｜Mobile</title>
  <script>
    (function () {
      var THEME_KEY = 'paper_digest_theme_v1';
      var storedTheme = null;
      try { storedTheme = localStorage.getItem(THEME_KEY); } catch (e) {}
      var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = storedTheme === 'light' || storedTheme === 'dark' ? storedTheme : (systemDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --text: #142033;
      --sub: #5f6f87;
      --nav-bg: #dbe7fb;
      --nav-text: #17356f;
      --panel: #ffffff;
      --border: #d6e0f0;
      --panel-shadow: 0 8px 24px rgba(17, 43, 88, .08);
      --link: #1d63d6;
      --heading-accent: #1d63d6;
      --kw-bg: #e5edfb;
      --btn-bg: #dbe7fb;
      --btn-text: #17356f;
      --btn-active: #6c4ad3;
      --btn-active-text: #ffffff;
      --warning-bg: #fff1e6;
      --warning-text: #8a4a16;
    }
    :root[data-theme='dark'] {
      color-scheme: dark;
      --bg: #0b1020;
      --text: #eef3ff;
      --sub: #a9b6d3;
      --nav-bg: #1e2a50;
      --nav-text: #dce6ff;
      --panel: #121933;
      --border: #243054;
      --panel-shadow: 0 8px 24px rgba(0,0,0,.18);
      --link: #8bc4ff;
      --heading-accent: #8bc4ff;
      --kw-bg: #22305a;
      --btn-bg: #22305a;
      --btn-text: #eef3ff;
      --btn-active: #6c4ad3;
      --btn-active-text: #eef3ff;
      --warning-bg: #3a2318;
      --warning-text: #ffd4b5;
    }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    .shell { padding: 16px 14px 28px; max-width: 900px; margin: 0 auto; }
    h1 { font-size: 24px; margin: 0 0 6px; }
    h2 { font-size: 20px; margin: 0 0 10px; }
    .sub { color: var(--sub); margin-bottom: 12px; font-size: 14px; }
    .top-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px; }
    .nav { margin-left: -2px; }
    .nav a { display: inline-block; color: var(--nav-text); text-decoration: none; background: var(--nav-bg); padding: 8px 12px; border-radius: 999px; border: 0; cursor: pointer; font: inherit; }
    .theme-toggle { --toggle-duration: .75s; position: relative; display: inline-flex; align-items: center; justify-content: center; width: 84px; height: 40px; min-width: 84px; border: 0; padding: 0; background: transparent; cursor: pointer; appearance: none; -webkit-appearance: none; overflow: visible; }
    .theme-toggle-track { position: relative; display: block; width: 84px; height: 40px; border-radius: 999px; overflow: hidden; background: linear-gradient(180deg, #dfeaf8 0%, #bdd3f0 100%); box-shadow: inset 0 0 0 1px rgba(130,153,188,.35), 0 1px 2px rgba(14,30,66,.08); transition: background var(--toggle-duration) cubic-bezier(.22,.61,.36,1), box-shadow var(--toggle-duration) cubic-bezier(.22,.61,.36,1); }
    .theme-toggle-track::before { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,.24), rgba(255,255,255,0)); }
    .theme-toggle-sky { position: absolute; border-radius: 50%; transition: transform var(--toggle-duration) cubic-bezier(.22,.61,.36,1), opacity var(--toggle-duration) cubic-bezier(.22,.61,.36,1), background var(--toggle-duration) cubic-bezier(.22,.61,.36,1); }
    .theme-toggle-sky-day { width: 18px; height: 18px; left: 50px; top: 18px; background: rgba(255,255,255,.35); opacity: 1; }
    .theme-toggle-sky-night { width: 14px; height: 14px; right: 16px; top: 11px; background: #eef2ff; box-shadow: -4px 0 0 1px rgba(17,24,39,.18) inset; opacity: 0; transform: translateY(2px) scale(.92); }
    .theme-toggle-stars { position: absolute; inset: 0; opacity: 0; transition: opacity var(--toggle-duration) cubic-bezier(.22,.61,.36,1); }
    .theme-toggle-stars::before { content: ''; position: absolute; width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,.82); right: 36px; top: 11px; box-shadow: -10px 8px 0 rgba(255,255,255,.55), -18px 17px 0 rgba(255,255,255,.4), 8px 14px 0 rgba(255,255,255,.45); }
    .theme-toggle-thumb { position: absolute; top: 4px; left: 4px; width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(180deg, #ffd978 0%, #f6b73c 100%); box-shadow: 0 2px 8px rgba(108,85,24,.26), inset 0 -2px 3px rgba(180,120,10,.18); transform: translate3d(0, 0, 0); will-change: transform, background, box-shadow; transition: transform var(--toggle-duration) cubic-bezier(.22,.61,.36,1), background var(--toggle-duration) cubic-bezier(.22,.61,.36,1), box-shadow var(--toggle-duration) cubic-bezier(.22,.61,.36,1); z-index: 2; }
    .theme-toggle[data-theme='dark'] .theme-toggle-track { background: linear-gradient(180deg, #1d2745 0%, #11182d 100%); box-shadow: inset 0 0 0 1px rgba(116,137,188,.2), 0 1px 2px rgba(0,0,0,.24); }
    .theme-toggle[data-theme='dark'] .theme-toggle-thumb { transform: translate3d(44px, 0, 0); background: linear-gradient(180deg, #eef2ff 0%, #c9d2ec 100%); box-shadow: 0 2px 8px rgba(5,8,16,.34), inset 0 -2px 3px rgba(120,130,160,.2); }
    .theme-toggle[data-theme='dark'] .theme-toggle-sky-day { opacity: .18; transform: scale(.92); }
    .theme-toggle[data-theme='dark'] .theme-toggle-sky-night { opacity: 1; transform: translateY(0) scale(1); }
    .theme-toggle[data-theme='dark'] .theme-toggle-stars { opacity: 1; }
    .theme-toggle:focus-visible { outline: 2px solid var(--link); outline-offset: 3px; }
    .theme-animating, .theme-animating *, .theme-animating *::before, .theme-animating *::after { transition: background-color .75s cubic-bezier(.22,.61,.36,1), color .75s cubic-bezier(.22,.61,.36,1), border-color .75s cubic-bezier(.22,.61,.36,1), box-shadow .75s cubic-bezier(.22,.61,.36,1), opacity .75s cubic-bezier(.22,.61,.36,1); }
    .note { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-bottom: 12px; }
    .warning { background: var(--warning-bg); color: var(--warning-text); }
    .favorites { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 14px; }
    .favorites-sub { color: var(--sub); font-size: 13px; margin: 0 0 10px; }
    .fav-card, .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 14px; margin-bottom: 14px; box-shadow: var(--panel-shadow); }
    .fav-top, .card-head { display: flex; justify-content: space-between; align-items: start; gap: 12px; color: var(--sub); font-size: 13px; margin-bottom: 10px; }
    .index { font-weight: 700; color: var(--link); }
    h2 a, .fav-title a { color: var(--text); text-decoration: none; }
    h2 { line-height: 1.45; margin: 0 0 10px; }
    h3 { margin: 14px 0 6px; font-size: 15px; color: var(--heading-accent); }
    p { margin: 0; white-space: pre-wrap; line-height: 1.65; color: var(--text); font-size: 14px; }
    .authors, .fav-meta { color: var(--sub); font-size: 13px; margin-bottom: 10px; }
    .kw { display: inline-block; padding: 4px 8px; border-radius: 999px; background: var(--kw-bg); margin: 0 6px 6px 0; font-size: 12px; }
    .muted { color: var(--sub); }
    .fav-btn, .remove-fav { border: 0; border-radius: 999px; padding: 7px 12px; cursor: pointer; background: var(--btn-bg); color: var(--btn-text); }
    .fav-btn.active { background: var(--btn-active); color: var(--btn-active-text); }
  </style>
</head>
<body>
  <div class="shell">
    <h1>Morning Paper Digest for Microelectronics / IC · Mobile</h1>
    <div class="sub">Updated: 2026-04-05 22:32（Asia/Shanghai）</div>
    <div class="top-actions">
      <div class="nav"><a href="desktop.html">Desktop view</a></div>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme" title="Toggle light and dark theme. Double-click quickly or right-click to follow the system setting.">
        <span class="theme-toggle-track" aria-hidden="true">
          <span class="theme-toggle-sky theme-toggle-sky-day"></span>
          <span class="theme-toggle-sky theme-toggle-sky-night"></span>
          <span class="theme-toggle-stars"></span>
          <span class="theme-toggle-thumb"></span>
        </span>
      </button>
    </div>
    <section class="favorites">
      <h2>Saved Papers</h2>
      <p class="favorites-sub">Saved papers stay in this browser on this device, so you can revisit them later.</p>
      <div id="favorites-list"></div>
    </section>
    
    <article class="card"><p>No matching new papers have been identified for today yet.</p></article>
  </div>

  <script>
    const FAVORITES_KEY = 'paper_digest_favorites_v1';
    const THEME_KEY = 'paper_digest_theme_v1';
    const themeQuery = window.matchMedia ? window.matchMedia('(prefers-color-scheme: dark)') : null;
    function getStoredTheme() {
      try { return localStorage.getItem(THEME_KEY); } catch { return null; }
    }
    function getPreferredTheme() {
      const stored = getStoredTheme();
      if (stored === 'light' || stored === 'dark') return stored;
      return themeQuery && themeQuery.matches ? 'dark' : 'light';
    }
    function applyTheme(theme, options = {}) {
      const shouldAnimate = options.animate !== false;
      if (shouldAnimate) document.documentElement.classList.add('theme-animating');
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.style.colorScheme = theme;
      if (shouldAnimate) {
        clearTimeout(window.__themeAnimTimer);
        window.__themeAnimTimer = setTimeout(() => {
          document.documentElement.classList.remove('theme-animating');
        }, 750);
      }
    }
    function updateThemeToggle() {
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;
      const stored = getStoredTheme();
      const current = document.documentElement.getAttribute('data-theme') || getPreferredTheme();
      btn.dataset.theme = current;
      btn.dataset.mode = stored ? 'manual' : 'system';
      const modeLabel = stored ? `Manual ${current} mode` : `Following system (${current})`;
      btn.setAttribute('aria-label', `Theme toggle. ${modeLabel}. Click to switch. Double-click quickly or right-click to follow the system setting.`);
      btn.title = stored
        ? 'Manual theme mode. Click to switch between light and dark. Double-click quickly or right-click to follow the system setting.'
        : 'Currently following the system theme. Click to switch manually.';
    }
    function setThemePreference(next) {
      if (next === null) {
        try { localStorage.removeItem(THEME_KEY); } catch {}
        applyTheme(getPreferredTheme(), { animate: false });
      } else {
        try { localStorage.setItem(THEME_KEY, next); } catch {}
        applyTheme(next);
      }
      updateThemeToggle();
    }
    function cycleThemePreference() {
      const stored = getStoredTheme();
      const current = stored || getPreferredTheme();
      const next = current === 'dark' ? 'light' : 'dark';
      setThemePreference(next);
    }
    function loadFavorites() {
      try { return JSON.parse(localStorage.getItem(FAVORITES_KEY) || '[]'); } catch { return []; }
    }
    function saveFavorites(items) {
      localStorage.setItem(FAVORITES_KEY, JSON.stringify(items));
    }
    function escapeHtml(text) {
      return String(text ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    }
    function favCardHtml(paper) {
      const authors = (paper.authors || []).join(', ') || '—';
      const kws = (paper.highlights || []).length ? paper.highlights.map(k => `<span class="kw">${escapeHtml(k)}</span>`).join(' ') : '<span class="kw muted">No highlighted keywords</span>';
      return `
      <article class="fav-card" data-uid="${escapeHtml(paper.uid)}">
        <div class="fav-top">
          <div>
            <div class="fav-title"><a href="${escapeHtml(paper.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(paper.title)}</a></div>
            <div class="fav-meta">${escapeHtml(paper.source)} · ${escapeHtml(paper.published)}</div>
          </div>
          <button class="remove-fav" type="button">Remove</button>
        </div>
        <div class="authors">Authors: ${escapeHtml(authors)}</div>
        <div class="keywords">${kws}</div>
      </article>`;
    }
    function renderFavorites() {
      const wrap = document.getElementById('favorites-list');
      const items = loadFavorites();
      if (!items.length) {
        wrap.innerHTML = '<article class="fav-card"><p>No saved papers yet. Use “Save” on any paper you want to keep.</p></article>';
        return;
      }
      wrap.innerHTML = items.map(favCardHtml).join('');
      wrap.querySelectorAll('.remove-fav').forEach(btn => {
        btn.addEventListener('click', () => {
          const uid = btn.closest('.fav-card')?.dataset?.uid;
          const next = loadFavorites().filter(item => item.uid !== uid);
          saveFavorites(next);
          renderFavorites();
          syncButtons();
        });
      });
    }
    function syncButtons() {
      const ids = new Set(loadFavorites().map(item => item.uid));
      document.querySelectorAll('.card[data-paper]').forEach(card => {
        const btn = card.querySelector('.fav-btn');
        if (!btn) return;
        const paper = JSON.parse(card.dataset.paper);
        const active = ids.has(paper.uid);
        btn.textContent = active ? '★ Saved' : '☆ Save';
        btn.classList.toggle('active', active);
      });
    }
    function bindButtons() {
      document.querySelectorAll('.card[data-paper]').forEach(card => {
        const btn = card.querySelector('.fav-btn');
        if (!btn || btn.dataset.bound === '1') return;
        btn.dataset.bound = '1';
        btn.addEventListener('click', () => {
          const paper = JSON.parse(card.dataset.paper);
          const items = loadFavorites();
          const exists = items.some(item => item.uid === paper.uid);
          const next = exists ? items.filter(item => item.uid !== paper.uid) : [paper, ...items];
          saveFavorites(next);
          renderFavorites();
          syncButtons();
        });
      });
      syncButtons();
    }
    document.addEventListener('DOMContentLoaded', () => {
      applyTheme(getPreferredTheme(), { animate: false });
      const toggle = document.getElementById('theme-toggle');
      if (toggle) {
        updateThemeToggle();
        let lastToggleClickAt = 0;
        toggle.addEventListener('click', () => {
          const now = Date.now();
          if (now - lastToggleClickAt < 220) {
            lastToggleClickAt = 0;
            setThemePreference(null);
            return;
          }
          lastToggleClickAt = now;
          cycleThemePreference();
        });
        toggle.addEventListener('contextmenu', event => {
          event.preventDefault();
          setThemePreference(null);
        });
      }
      if (themeQuery && typeof themeQuery.addEventListener === 'function') {
        themeQuery.addEventListener('change', () => {
          if (!getStoredTheme()) {
            applyTheme(getPreferredTheme(), { animate: false });
            updateThemeToggle();
          }
        });
      }
      renderFavorites();
      bindButtons();
    });
  </script>
    
</body>
</html>
